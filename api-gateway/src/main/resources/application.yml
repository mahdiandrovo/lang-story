spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
            - Method=GET,POST
          filters:
            - StripPrefix=2
            - AddRequestHeader=Custom-Header, Drovo
            - name: LoggingAuthFilter
            - name: Authentication
              args:
                enabled: true

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/user/**
            - Method=GET,POST

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true

