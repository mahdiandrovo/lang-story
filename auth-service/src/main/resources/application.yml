spring:
  application:
    name: auth-service

  #DB configuration
  datasource:
    url: jdbc:mysql://localhost:3306/authDB
    username: root
    password: 12345678

  jpa:
    hibernate:
      ddl-auto: create-drop

    show-sql: true

    properties:
      hibernate:
        format_sql: true

#Eureka config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 9010